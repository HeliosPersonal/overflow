# Ollama Helm Chart Values
# Managed by Terraform
    
image:
  repository: ollama/ollama
  tag: latest
  pullPolicy: IfNotPresent
    
service:
  type: ClusterIP
  port: 11434
  targetPort: 11434
  name: ollama-svc
    
resources:
  requests:
    memory: 2Gi
    cpu: 500m
  limits:
    memory: 8Gi
    cpu: 4000m
    
persistence:
  enabled: true
  size: 20Gi
  storageClass: ""  # Use default storage class
  accessMode: ReadWriteOnce
    
# Environment variables
env:
  - name: OLLAMA_HOST
    value: "0.0.0.0:11434"
  - name: OLLAMA_KEEP_ALIVE
    value: "24h"
  - name: OLLAMA_MAX_LOADED_MODELS
    value: "1"
  - name: OLLAMA_NUM_PARALLEL
    value: "2"
    
# Init container to pull model
initModels:
  enabled: true
  models:
    - phi3.5:mini
    
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: 11434
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
    
readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: 11434
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
