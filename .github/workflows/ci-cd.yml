name: CI/CD Pipeline

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      branch:
        description: 'Branch to deploy (leave empty for current branch)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  KUBECONFIG: /home/github-runner/.kube/config

jobs:
  # ============================================================================
  # BUILD & TEST
  # ============================================================================
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 📦 Restore dependencies
        run: dotnet restore Overflow.slnx

      - name: 🔨 Build solution
        run: dotnet build Overflow.slnx --no-restore --configuration Release

      - name: 🧪 Run tests
        run: dotnet test Overflow.slnx --no-build --configuration Release --verbosity normal

  # ============================================================================
  # BUILD DOCKER IMAGES
  # Build each image, push to GHCR (for permanent storage/audit),
  # and save as a .tar artifact so deploy jobs can import directly
  # into k3s containerd without pulling from the registry.
  # ============================================================================
  build-images:
    name: 🐳 Build ${{ matrix.service }}
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: QuestionService
            dockerfile: Overflow.QuestionService/Dockerfile
            image: overflow-question
            context: .
          - service: SearchService
            dockerfile: Overflow.SearchService/Dockerfile
            image: overflow-search
            context: .
          - service: ProfileService
            dockerfile: Overflow.ProfileService/Dockerfile
            image: overflow-profile
            context: .
          - service: StatsService
            dockerfile: Overflow.StatsService/Dockerfile
            image: overflow-stats
            context: .
          - service: VoteService
            dockerfile: Overflow.VoteService/Dockerfile
            image: overflow-vote
            context: .
          - service: DataSeederService
            dockerfile: Overflow.DataSeederService/Dockerfile
            image: overflow-data-seeder
            context: .
          - service: WebApp
            dockerfile: webapp/Dockerfile
            image: overflow-webapp
            context: ./webapp

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup environment
        id: repo_owner
        run: echo "owner_lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build image
        run: |
          IMAGE_NAME="${{ env.DOCKER_REGISTRY }}/${{ steps.repo_owner.outputs.owner_lc }}/${{ matrix.image }}"
          if [ "${{ matrix.service }}" = "WebApp" ]; then
            docker build -f ${{ matrix.dockerfile }} \
              --build-arg INFISICAL_CLIENT_ID="${{ secrets.INFISICAL_CLIENT_ID }}" \
              --build-arg INFISICAL_CLIENT_SECRET="${{ secrets.INFISICAL_CLIENT_SECRET }}" \
              --build-arg INFISICAL_PROJECT_ID="${{ secrets.INFISICAL_PROJECT_ID }}" \
              --build-arg NODE_ENV="production" \
              -t ${IMAGE_NAME}:${{ env.IMAGE_TAG }} \
              ${{ matrix.context }}
          else
            docker build -f ${{ matrix.dockerfile }} \
              -t ${IMAGE_NAME}:${{ env.IMAGE_TAG }} \
              ${{ matrix.context }}
          fi

      - name: 📤 Push to GHCR
        run: |
          IMAGE_NAME="${{ env.DOCKER_REGISTRY }}/${{ steps.repo_owner.outputs.owner_lc }}/${{ matrix.image }}"
          docker push ${IMAGE_NAME}:${{ env.IMAGE_TAG }}

      - name: 💾 Save image as tar artifact
        run: |
          IMAGE_NAME="${{ env.DOCKER_REGISTRY }}/${{ steps.repo_owner.outputs.owner_lc }}/${{ matrix.image }}"
          docker save ${IMAGE_NAME}:${{ env.IMAGE_TAG }} | gzip > /tmp/${{ matrix.image }}.tar.gz

      - name: 📦 Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.image }}
          path: /tmp/${{ matrix.image }}.tar.gz
          retention-days: 1

  # ============================================================================
  # TERRAFORM
  # ============================================================================
  terraform:
    name: 🏗️ Terraform (overflow infra)
    needs: build-images
    if: |
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/development' ||
        github.ref == 'refs/heads/main'
      )) ||
      github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform
    env:
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      TF_VAR_pg_password:        ${{ secrets.PG_PASSWORD }}
      TF_VAR_rabbit_password:    ${{ secrets.RABBIT_PASSWORD }}
      TF_VAR_typesense_api_key:  ${{ secrets.TYPESENSE_API_KEY }}
      TF_VAR_kubeconfig_path:    /home/github-runner/.kube/config
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ✅ Verify Kubernetes access
        run: kubectl cluster-info

      - name: ⚙️ Terraform Init
        run: terraform init

      - name: 🔍 Terraform Validate
        run: terraform validate

      - name: 📋 Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⏭️ No infrastructure changes — apply will be skipped"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Infrastructure changes detected — apply will run"
          else
            echo "❌ Terraform plan failed"
            exit 1
          fi

      - name: 🚀 Terraform Apply
        if: |
          steps.plan.outputs.has_changes == 'true' && (
            (github.ref == 'refs/heads/development' && github.event_name == 'push') ||
            (github.ref == 'refs/heads/main'        && github.event_name == 'push') ||
            github.event_name == 'workflow_dispatch'
          )
        run: terraform apply -auto-approve tfplan

  # ============================================================================
  # STAGING DEPLOYMENT
  # ============================================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    needs: [build-images, terraform]
    if: |
      (github.ref == 'refs/heads/development' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: self-hosted
    environment: staging
    env:
      NAMESPACE: apps-staging
      OVERLAY: staging

    steps:
      - name: 📋 Deployment Info
        run: |
          echo "🎯 Deploying to: STAGING"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "📦 Commit: ${{ github.sha }}"

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup environment
        id: setup
        run: echo "owner_lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: ✅ Verify Kubernetes access
        run: kubectl get nodes

      - name: 📦 Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-*
          path: /tmp/images
          merge-multiple: true

      - name: 📥 Import images into k3s containerd
        run: |
          OWNER="${{ steps.setup.outputs.owner_lc }}"
          TAG="${{ env.IMAGE_TAG }}"
          REG="${{ env.DOCKER_REGISTRY }}"
          for image in overflow-question overflow-search overflow-profile overflow-stats overflow-vote overflow-data-seeder overflow-webapp; do
            echo "▶ Importing ${image}:${TAG} into k3s"
            sudo k3s ctr images import /tmp/images/${image}.tar.gz
          done

      - name: 🏷️ Update image tags
        working-directory: ./k8s/overlays/${{ env.OVERLAY }}
        run: |
          sed -i "s/GITHUB_USERNAME/${{ steps.setup.outputs.owner_lc }}/g" kustomization.yaml
          sed -i "s|newTag: SHA_REPLACED_BY_CICD|newTag: ${{ env.IMAGE_TAG }}|g" kustomization.yaml

      - name: 🔐 Inject secrets
        working-directory: ./k8s/overlays/${{ env.OVERLAY }}
        run: |
          sed -i "s|INFISICAL_PROJECT_ID: \"PLACEHOLDER_WILL_BE_REPLACED_BY_CICD\"|INFISICAL_PROJECT_ID: \"${{ secrets.INFISICAL_PROJECT_ID }}\"|g" ../../base/infisical/secret.yaml
          sed -i "s|INFISICAL_CLIENT_ID: \"PLACEHOLDER_WILL_BE_REPLACED_BY_CICD\"|INFISICAL_CLIENT_ID: \"${{ secrets.INFISICAL_CLIENT_ID }}\"|g" ../../base/infisical/secret.yaml
          sed -i "s|INFISICAL_CLIENT_SECRET: \"PLACEHOLDER_WILL_BE_REPLACED_BY_CICD\"|INFISICAL_CLIENT_SECRET: \"${{ secrets.INFISICAL_CLIENT_SECRET }}\"|g" ../../base/infisical/secret.yaml

      - name: 👀 Preview manifests
        working-directory: ./k8s/overlays/${{ env.OVERLAY }}
        run: kubectl kustomize . | head -n 100

      - name: 🚀 Deploy to Kubernetes
        working-directory: ./k8s/overlays/${{ env.OVERLAY }}
        run: kubectl apply -k .

      - name: ⏳ Wait for rollout
        run: |
          kubectl rollout status deployment/question-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/search-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/profile-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/stats-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/vote-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/overflow-webapp -n ${{ env.NAMESPACE }} --timeout=3m

      - name: 📊 Deployment status
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo "=== Logs from question-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=question-svc --tail=30 --prefix=true || true
          echo "=== Logs from search-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=search-svc --tail=30 --prefix=true || true
          echo "=== Logs from profile-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=profile-svc --tail=30 --prefix=true || true
          echo "=== Logs from stats-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=stats-svc --tail=30 --prefix=true || true
          echo "=== Logs from vote-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=vote-svc --tail=30 --prefix=true || true
          echo "=== Logs from overflow-webapp ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=overflow-webapp --tail=30 --prefix=true || true

      - name: 🧹 Cleanup old resources
        run: |
          chmod +x k8s/scripts/cleanup-k8s-resources.sh
          ./k8s/scripts/cleanup-k8s-resources.sh ${{ env.NAMESPACE }}
        continue-on-error: true

  # ============================================================================
  # PRODUCTION DEPLOYMENT
  # ============================================================================
  deploy-production:
    name: 🏭 Deploy to Production
    needs: [build-images, terraform]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: self-hosted
    environment: production
    env:
      NAMESPACE: apps-production
      OVERLAY: production

    steps:
      - name: 📋 Deployment Info
        run: |
          echo "🎯 Deploying to: PRODUCTION"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "📦 Commit: ${{ github.sha }}"

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup environment
        id: setup
        run: echo "owner_lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: ✅ Verify Kubernetes access
        run: kubectl get nodes

      - name: 📦 Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-*
          path: /tmp/images
          merge-multiple: true

      - name: 📥 Import images into k3s containerd
        run: |
          OWNER="${{ steps.setup.outputs.owner_lc }}"
          TAG="${{ env.IMAGE_TAG }}"
          REG="${{ env.DOCKER_REGISTRY }}"
          for image in overflow-question overflow-search overflow-profile overflow-stats overflow-vote overflow-data-seeder overflow-webapp; do
            echo "▶ Importing ${image}:${TAG} into k3s"
            sudo k3s ctr images import /tmp/images/${image}.tar.gz
          done

      - name: 🏷️ Update image tags
        working-directory: ./k8s/overlays/${{ env.OVERLAY }}
        run: |
          sed -i "s/GITHUB_USERNAME/${{ steps.setup.outputs.owner_lc }}/g" kustomization.yaml
          sed -i "s|newTag: SHA_REPLACED_BY_CICD|newTag: ${{ env.IMAGE_TAG }}|g" kustomization.yaml

      - name: 🔐 Inject secrets
        working-directory: ./k8s/overlays/${{ env.OVERLAY }}
        run: |
          sed -i "s|INFISICAL_PROJECT_ID: \"PLACEHOLDER_WILL_BE_REPLACED_BY_CICD\"|INFISICAL_PROJECT_ID: \"${{ secrets.INFISICAL_PROJECT_ID }}\"|g" ../../base/infisical/secret.yaml
          sed -i "s|INFISICAL_CLIENT_ID: \"PLACEHOLDER_WILL_BE_REPLACED_BY_CICD\"|INFISICAL_CLIENT_ID: \"${{ secrets.INFISICAL_CLIENT_ID }}\"|g" ../../base/infisical/secret.yaml
          sed -i "s|INFISICAL_CLIENT_SECRET: \"PLACEHOLDER_WILL_BE_REPLACED_BY_CICD\"|INFISICAL_CLIENT_SECRET: \"${{ secrets.INFISICAL_CLIENT_SECRET }}\"|g" ../../base/infisical/secret.yaml

      - name: 👀 Preview manifests
        working-directory: ./k8s/overlays/${{ env.OVERLAY }}
        run: kubectl kustomize . | head -n 100

      - name: 🚀 Deploy to Kubernetes
        working-directory: ./k8s/overlays/${{ env.OVERLAY }}
        run: kubectl apply -k .

      - name: ⏳ Wait for rollout
        run: |
          kubectl rollout status deployment/question-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/search-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/profile-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/stats-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/vote-svc -n ${{ env.NAMESPACE }} --timeout=3m
          kubectl rollout status deployment/overflow-webapp -n ${{ env.NAMESPACE }} --timeout=3m

      - name: 📊 Deployment status
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo "=== Logs from question-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=question-svc --tail=30 --prefix=true || true
          echo "=== Logs from search-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=search-svc --tail=30 --prefix=true || true
          echo "=== Logs from profile-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=profile-svc --tail=30 --prefix=true || true
          echo "=== Logs from stats-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=stats-svc --tail=30 --prefix=true || true
          echo "=== Logs from vote-svc ==="
          kubectl logs -n ${{ env.NAMESPACE }} -l app=vote-svc --tail=30 --prefix=true || true

      - name: 🧪 Smoke tests
        run: |
          sleep 10
          kubectl run curl-test --image=curlimages/curl --rm -i --restart=Never -n ${{ env.NAMESPACE }} -- \
            curl -f -m 5 http://question-svc:8080/health || echo "⚠️ Health check failed"
          kubectl run curl-test --image=curlimages/curl --rm -i --restart=Never -n ${{ env.NAMESPACE }} -- \
            curl -f -m 5 http://search-svc:8080/health || echo "⚠️ Health check failed"
          kubectl run curl-test --image=curlimages/curl --rm -i --restart=Never -n ${{ env.NAMESPACE }} -- \
            curl -f -m 5 http://profile-svc:8080/health || echo "⚠️ Health check failed"
          kubectl run curl-test --image=curlimages/curl --rm -i --restart=Never -n ${{ env.NAMESPACE }} -- \
            curl -f -m 5 http://stats-svc:8080/health || echo "⚠️ Health check failed"
          kubectl run curl-test --image=curlimages/curl --rm -i --restart=Never -n ${{ env.NAMESPACE }} -- \
            curl -f -m 5 http://vote-svc:8080/health || echo "⚠️ Health check failed"

      - name: 🧹 Cleanup old resources
        run: |
          chmod +x k8s/scripts/cleanup-k8s-resources.sh
          ./k8s/scripts/cleanup-k8s-resources.sh ${{ env.NAMESPACE }}
        continue-on-error: false

