x-chromium-common: &chromium-common
  image: lscr.io/linuxserver/chromium:latest
  shm_size: "1gb"
  restart: unless-stopped
  environment:
    PUID: "1000"
    PGID: "1000"
    TZ: "Europe/Warsaw"
    CHROME_CLI: "--no-default-browser-check --disable-default-apps --disable-popup-blocking --disable-notifications --start-maximized --no-sandbox --disable-web-security --disable-gpu --disable-features=IsolateOrigins,site-per-process ${TARGET_URL}"
    NO_PROXY: "host.docker.internal,localhost,127.0.0.1"
  extra_hosts:
    - "host.docker.internal:host-gateway"
    - "app-proxy:host-gateway"

services:
  poker-user-1:
    <<: *chromium-common
    container_name: poker-user-1
    ports:
      - "3001:3000"
    volumes:
      - chromium-user-1:/config

  poker-user-2:
    <<: *chromium-common
    container_name: poker-user-2
    ports:
      - "3002:3000"
    volumes:
      - chromium-user-2:/config

  poker-user-3:
    <<: *chromium-common
    container_name: poker-user-3
    ports:
      - "3003:3000"
    volumes:
      - chromium-user-3:/config

  poker-user-4:
    <<: *chromium-common
    container_name: poker-user-4
    ports:
      - "3004:3000"
    volumes:
      - chromium-user-4:/config

  poker-user-5:
    <<: *chromium-common
    container_name: poker-user-5
    ports:
      - "3005:3000"
    volumes:
      - chromium-user-5:/config

