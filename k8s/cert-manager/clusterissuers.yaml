# ====================================================================================
# LET'S ENCRYPT CLUSTER ISSUERS
# ====================================================================================
# Defines ClusterIssuers for automatic SSL/TLS certificate provisioning
# Staging issuer for testing, Production issuer for live domains
# ====================================================================================

# Staging ClusterIssuer - for testing (high rate limits, untrusted certificates)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ${LETSENCRYPT_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            class: nginx

---
# Production ClusterIssuer - for live domains (rate limited: 50 certs/week per domain)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${LETSENCRYPT_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - http01:
          ingress:
            class: nginx

