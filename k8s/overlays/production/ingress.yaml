# ====================================================================================
# PRODUCTION INGRESS - Traffic Routing
# ====================================================================================
# Domains: devoverflow.org, www.devoverflow.org
# Namespace: apps-production
# ====================================================================================

# ------------------------------------------------------------------------------
# QUESTION SERVICE
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: question-svc-ingress
  namespace: apps-production
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /questions$1$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - devoverflow.org
        - www.devoverflow.org
      secretName: webapp-production-tls
  rules:
    - host: devoverflow.org
      http:
        paths:
          - path: /api/questions(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
    - host: www.devoverflow.org
      http:
        paths:
          - path: /api/questions(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
---
