# ------------------------------------------------------------------------------
# NEXTAUTH API ROUTES
# NO REWRITE — NextAuth expects /api/auth/* as-is
# Must be evaluated before the webapp catch-all
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp-auth-ingress
  namespace: apps-production
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - devoverflow.org
        - www.devoverflow.org
      secretName: webapp-production-tls
  rules:
    - host: devoverflow.org
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: overflow-webapp
                port:
                  number: 3000
    - host: www.devoverflow.org
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: overflow-webapp
                port:
                  number: 3000
---
# ------------------------------------------------------------------------------
# WEBAPP (Catch-All)
# SSR pages, static assets, client-side navigation
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: overflow-webapp-ingress
  namespace: apps-production
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - devoverflow.org
        - www.devoverflow.org
      secretName: webapp-production-tls
  rules:
    - host: devoverflow.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: overflow-webapp
                port:
                  number: 3000
    - host: www.devoverflow.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: overflow-webapp
                port:
                  number: 3000

