# ====================================================================================
# PRODUCTION INGRESS - Traffic Routing
# ====================================================================================
# Domains: devoverflow.org, www.devoverflow.org
# Namespace: apps-production
#
# SSL/TLS: Cloudflare Full (Strict) mode.
#   - Cloudflare ↔ browser:  HTTPS (Cloudflare Universal SSL)
#   - Cloudflare ↔ origin:   HTTPS using Cloudflare Origin Certificate
#   The 'cloudflare-origin' TLS secret is copied here by overflow/terraform.
# ====================================================================================

# ------------------------------------------------------------------------------
# QUESTION SERVICE
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: question-svc-ingress
  namespace: apps-production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /questions$1$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - devoverflow.org
        - www.devoverflow.org
      secretName: cloudflare-origin
  rules:
    - host: devoverflow.org
      http:
        paths:
          - path: /api/questions(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
    - host: www.devoverflow.org
      http:
        paths:
          - path: /api/questions(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
---
