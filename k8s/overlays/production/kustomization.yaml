# Production Environment Kustomization
# Namespace: apps-production | Replicas: 3 per service (high availability)

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apps-production

resources:
  - ../../base/infisical
  - ../../base/question-svc
  - ../../base/search-svc
  - ../../base/profile-svc
  - ../../base/stats-svc
  - ../../base/vote-svc
  - ../../base/overflow-webapp
  - ingress.yaml

# Image tags updated by CI/C
images:
  - name: ghcr.io/placeholder/overflow-question
    newName: ghcr.io/viacheslavmelnichenko/overflow-question
    newTag: latest
  - name: ghcr.io/placeholder/overflow-search
    newName: ghcr.io/viacheslavmelnichenko/overflow-search
    newTag: latest
  - name: ghcr.io/placeholder/overflow-profile
    newName: ghcr.io/viacheslavmelnichenko/overflow-profile
    newTag: latest
  - name: ghcr.io/placeholder/overflow-stats
    newName: ghcr.io/viacheslavmelnichenko/overflow-stats
    newTag: latest
  - name: ghcr.io/placeholder/overflow-vote
    newName: ghcr.io/viacheslavmelnichenko/overflow-vote
    newTag: latest
  - name: ghcr.io/placeholder/overflow-webapp
    newName: ghcr.io/viacheslavmelnichenko/overflow-webapp
    newTag: latest

configMapGenerator:
  - name: app-config
    behavior: create
    literals:
      - aspnetcore-environment=Production

# No more secrets needed - all loaded from Infisical

labels:
  - pairs:
      environment: production
      managed-by: kustomize

replicas:
  - name: question-svc
    count: 1
  - name: search-svc
    count: 1
  - name: profile-svc
    count: 1
  - name: stats-svc
    count: 1
  - name: vote-svc
    count: 1
  - name: overflow-webapp
    count: 1

# Production-specific resource adjustments
patches:
  # Ingress host configuration for production
  - target:
      kind: Ingress
      name: question-svc
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: overflow-api.helios
  - target:
      kind: Ingress
      name: search-svc
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: overflow-api.helios
  
  # Resource adjustments for production (higher than staging)
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
    target:
      kind: Deployment
      name: question-svc
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
    target:
      kind: Deployment
      name: search-svc
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
    target:
      kind: Deployment
      name: profile-svc
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
    target:
      kind: Deployment
      name: stats-svc
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
    target:
      kind: Deployment
      name: vote-svc
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
    target:
      kind: Deployment
      name: overflow-webapp
