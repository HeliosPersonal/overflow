# Staging Environment Kustomization
# Namespace: apps-staging | Replicas: 2 per service

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apps-staging

resources:
  - ../../base/infisical
  - ../../base/question-svc
  - ../../base/search-svc
  - ../../base/profile-svc
  - ../../base/stats-svc
  - ../../base/vote-svc
  - ../../base/overflow-webapp
  - ingress.yaml

# Image tags updated by CI/CD
images:
  - name: ghcr.io/placeholder/overflow-question
    newName: ghcr.io/viacheslavmelnichenko/overflow-question
    newTag: SHA_REPLACED_BY_CICD
  - name: ghcr.io/placeholder/overflow-search
    newName: ghcr.io/viacheslavmelnichenko/overflow-search
    newTag: SHA_REPLACED_BY_CICD
  - name: ghcr.io/placeholder/overflow-profile
    newName: ghcr.io/viacheslavmelnichenko/overflow-profile
    newTag: SHA_REPLACED_BY_CICD
  - name: ghcr.io/placeholder/overflow-stats
    newName: ghcr.io/viacheslavmelnichenko/overflow-stats
    newTag: SHA_REPLACED_BY_CICD
  - name: ghcr.io/placeholder/overflow-vote
    newName: ghcr.io/viacheslavmelnichenko/overflow-vote
    newTag: SHA_REPLACED_BY_CICD
  - name: ghcr.io/placeholder/overflow-webapp
    newName: ghcr.io/viacheslavmelnichenko/overflow-webapp
    newTag: SHA_REPLACED_BY_CICD

configMapGenerator:
  - name: app-config
    behavior: create
    literals:
      - aspnetcore-environment=Staging

# No more secrets needed - all loaded from Infisical

labels:
  - pairs:
      environment: staging
      managed-by: kustomize

replicas:
  - name: question-svc
    count: 2
  - name: search-svc
    count: 2
  - name: profile-svc
    count: 2
  - name: stats-svc
    count: 2
  - name: vote-svc
    count: 2
  - name: overflow-webapp
    count: 2

patches:
  - target:
      kind: Deployment
      name: overflow-webapp
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "staging"
