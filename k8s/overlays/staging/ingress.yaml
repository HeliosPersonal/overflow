# ------------------------------------------------------------------------------
# NEXTAUTH API ROUTES INGRESS
# NO REWRITE - NextAuth expects /api/auth/* paths as-is
# Extended timeouts for OAuth callbacks
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp-auth-ingress
  namespace: apps-staging
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.devoverflow.org
      secretName: cloudflare-origin
  rules:
    - host: staging.devoverflow.org
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: overflow-webapp
                port:
                  number: 3000
---
# ------------------------------------------------------------------------------
# WEBAPP INGRESS (Catch-All)
# SSR pages, static assets, client-side navigation
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: overflow-webapp-ingress
  namespace: apps-staging
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.devoverflow.org
      secretName: cloudflare-origin
  rules:
    - host: staging.devoverflow.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: overflow-webapp
                port:
                  number: 3000

