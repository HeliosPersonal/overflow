# ------------------------------------------------------------------------------
# NEXTAUTH API ROUTES INGRESS
# ------------------------------------------------------------------------------
# Routes: /api/auth/* (signin, signout, callback, csrf, session, etc.)
# NO REWRITE - NextAuth expects /api/auth/* paths as-is
# Backend: overflow-webapp:3000
#
# IMPORTANT: This ingress MUST be evaluated before the main webapp ingress
# to ensure /api/auth/* requests go to the webapp, not backend services.
# NGINX orders rules by specificity, so /api/auth should match before /*
#
# Extended timeouts for auth operations (OAuth callbacks can be slow)
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp-auth-ingress
  namespace: apps-staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Extended timeouts for OAuth flows (Keycloak token exchange, etc.)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Allow larger request bodies for auth payloads
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.devoverflow.org
      secretName: webapp-staging-tls
  rules:
    - host: staging.devoverflow.org
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: overflow-webapp
                port:
                  number: 3000
---
# ------------------------------------------------------------------------------
# WEBAPP INGRESS (Catch-All)
# ------------------------------------------------------------------------------
# Routes: /* (all paths not matched by other ingresses)
# NO REWRITE - serves Next.js pages and static assets
# Backend: overflow-webapp:3000
#
# This is the "default" ingress that handles:
# - SSR pages (/, /questions, /questions/[id], /profile, etc.)
# - Static assets (/_next/*, /images/*, etc.)
# - Client-side navigation
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: overflow-webapp-ingress
  namespace: apps-staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.devoverflow.org
      secretName: webapp-staging-tls
  rules:
    - host: staging.devoverflow.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: overflow-webapp
                port:
                  number: 3000
    - host: overflow-staging.helios
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: overflow-webapp
                port:
                  number: 3000

