# ------------------------------------------------------------------------------
# ESTIMATION SERVICE INGRESS
# Only the WebSocket endpoint routes directly to estimation-svc.
# All HTTP API calls (/api/estimation/rooms, etc.) fall through to the webapp
# catch-all ingress so the Next.js BFF proxy can attach the Bearer token before
# forwarding to estimation-svc via the internal cluster DNS.
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: estimation-svc-ingress
  namespace: apps-staging
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /estimation/rooms/$1/ws
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: "estimation-svc"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.devoverflow.org
      secretName: cloudflare-origin
  rules:
    - host: staging.devoverflow.org
      http:
        paths:
          - path: /api/estimation/rooms/([^/]+)/ws
            pathType: ImplementationSpecific
            backend:
              service:
                name: estimation-svc
                port:
                  number: 8080
---
