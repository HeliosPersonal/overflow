# Staging Application Ingress
# Routes external traffic to all services via staging domain

---
# Question Service: /api/questions -> question-svc:8080/questions
# Question Service: /api/tags -> question-svc:8080/tags
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: question-svc-ingress
  namespace: apps-staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.devoverflow.org
      secretName: webapp-staging-tls
  rules:
    - host: staging.devoverflow.org
      http:
        paths:
          - path: /api/questions(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
          - path: /api/tags(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
    - host: overflow-api-staging.helios
      http:
        paths:
          - path: /questions
            pathType: Prefix
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
          - path: /tags
            pathType: Prefix
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
