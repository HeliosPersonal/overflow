# ====================================================================================
# STAGING INGRESS - Traffic Routing Configuration
# ====================================================================================
# Domain: staging.devoverflow.org (external) + *.helios (internal LAN)
# Namespace: apps-staging
#
# TRAFFIC FLOW:
# ====================================================================================
#
#   Internet → Cloudflare (CDN/WAF/SSL) → Home Router → K8s Ingress → Services
#
#   1. User requests https://staging.devoverflow.org/api/questions/123
#   2. Cloudflare proxies the request (DDNS updates IP dynamically)
#   3. Request hits NGINX Ingress Controller in the cluster
#   4. Ingress matches path /api/questions/* and routes to question-svc:8080
#   5. NGINX rewrites path: /api/questions/123 → /questions/123
#   6. question-svc processes request and returns response
#
# SSL/TLS CERTIFICATES:
# ====================================================================================
#   - Managed by cert-manager using Let's Encrypt (letsencrypt-production issuer)
#   - Certificate stored in secret: webapp-staging-tls
#   - Auto-renewed before expiration (cert-manager handles this)
#
# PATH REWRITING:
# ====================================================================================
#   Frontend uses /api prefix for all backend calls, but services don't have /api:
#   - /api/questions/*  → question-svc:8080/questions/*
#   - /api/search/*     → search-svc:8080/search/*
#   - /api/profiles/*   → profile-svc:8080/profiles/*
#   - /api/stats/*      → stats-svc:8080/stats/*
#   - /api/votes/*      → vote-svc:8080/votes/*
#   - /api/auth/*       → overflow-webapp:3000/api/auth/* (NextAuth - no rewrite!)
#   - /*                → overflow-webapp:3000/* (SSR pages)
#
# INTERNAL ACCESS (*.helios):
# ====================================================================================
#   For local network access without going through Cloudflare:
#   - overflow-api-staging.helios - Direct API access
#   - overflow-staging.helios - Direct webapp access
#   Requires local DNS or /etc/hosts entry pointing to cluster IP
#
# ====================================================================================

# ------------------------------------------------------------------------------
# QUESTION SERVICE INGRESS
# ------------------------------------------------------------------------------
# Routes: /api/questions/*, /api/questions/{id}/answers, etc.
# Rewrites: /api/questions/123 → /questions/123
# Backend: question-svc:8080
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: question-svc-ingress
  namespace: apps-staging
  annotations:
    # SSL certificate provisioning via cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    # Force HTTPS redirect for all HTTP requests
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Rewrite /api/questions/... to /questions/...
    # $1 = optional trailing slash, $2 = rest of path
    nginx.ingress.kubernetes.io/rewrite-target: /questions$1$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.devoverflow.org
      secretName: webapp-staging-tls  # cert-manager creates/updates this
  rules:
    # External access via Cloudflare
    - host: staging.devoverflow.org
      http:
        paths:
          - path: /api/questions(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
    # Internal LAN access (no Cloudflare, no SSL)
    - host: overflow-api-staging.helios
      http:
        paths:
          - path: /questions
            pathType: Prefix
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
---
