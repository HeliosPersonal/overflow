# ====================================================================================
# STAGING INGRESS - Traffic Routing Configuration
# ====================================================================================
# Domain: staging.devoverflow.org (external)
# Namespace: apps-staging
#
# SSL/TLS: Cloudflare Full (Strict) mode.
#   - Cloudflare ↔ browser:  HTTPS (Cloudflare Universal SSL)
#   - Cloudflare ↔ origin:   HTTPS using Cloudflare Origin Certificate
#   The 'cloudflare-origin' TLS secret is copied here by overflow/terraform.
#
# PATH REWRITING:
#   /api/questions/*  → question-svc:8080/questions/*
#   /api/tags/*       → question-svc:8080/tags/*
#   /api/search/*     → search-svc:8080/search/*
#   /api/stats/*      → stats-svc:8080/stats/*
#   /api/votes/*      → vote-svc:8080/votes/*
#   /api/notifications/* → notification-svc:8080/notifications/*
#   /api/auth/*       → overflow-webapp:3000/api/auth/* (no rewrite)
#   /*                → overflow-webapp:3000/*
# ====================================================================================

# ------------------------------------------------------------------------------
# QUESTION SERVICE INGRESS
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: question-svc-ingress
  namespace: apps-staging
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /questions$1$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.devoverflow.org
      secretName: cloudflare-origin
  rules:
    - host: staging.devoverflow.org
      http:
        paths:
          - path: /api/questions(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: question-svc
                port:
                  number: 8080
---
