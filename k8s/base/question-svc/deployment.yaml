# ====================================================================================
# QUESTION SERVICE - Deployment
# ====================================================================================
# Manages questions, answers, tags, and related CRUD operations
# Part of the Overflow microservices backend
# ====================================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: question-svc
  labels:
    app: question-svc
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: question-svc
  template:
    metadata:
      labels:
        app: question-svc
        component: api
    spec:
      containers:
        - name: question-svc
          image: ghcr.io/placeholder/overflow-question:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            # Connection strings + infra config from Terraform (postgres, rabbitmq, typesense, keycloak, otlp)
            - configMapRef:
                name: overflow-infra-config
          env:
            # ASP.NET Core configuration
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: aspnetcore-environment
            
            # Infisical credentials for centralized secrets management
            - name: INFISICAL_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_PROJECT_ID
            - name: INFISICAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_ID
            - name: INFISICAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_SECRET
            
            # Disable file watching to avoid inotify limits
            - name: DOTNET_USE_POLLING_FILE_WATCHER
              value: "true"
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              memory: "128Mi"
              cpu: "20m"
            limits:
              memory: "512Mi"
              cpu: "200m"
