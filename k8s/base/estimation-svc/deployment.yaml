# ====================================================================================
# ESTIMATION SERVICE - Deployment
# ====================================================================================
# Planning Poker estimation rooms with FusionCache (L1 + L2 Redis) + cross-pod
# WebSocket broadcast via Redis pub/sub. Multi-pod safe.
# Part of the Overflow microservices backend
# ====================================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: estimation-svc
  labels:
    app: estimation-svc
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: estimation-svc
  template:
    metadata:
      labels:
        app: estimation-svc
        component: api
    spec:
      containers:
        - name: estimation-svc
          image: ghcr.io/placeholder/overflow-estimation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: overflow-infra-config
          env:
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: aspnetcore-environment
            - name: INFISICAL_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_PROJECT_ID
            - name: INFISICAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_ID
            - name: INFISICAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_SECRET
            - name: DOTNET_USE_POLLING_FILE_WATCHER
              value: "true"
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"

