# ====================================================================================
# INFISICAL CREDENTIALS SECRET
# ====================================================================================
# Stores Infisical authentication credentials for all services
# Placeholders are replaced by CI/CD pipeline during deployment with actual values
# All services mount this secret to access centralized secrets from Infisical
# ====================================================================================

apiVersion: v1
kind: Secret
metadata:
  name: infisical-credentials
type: Opaque
stringData:
  INFISICAL_CLIENT_ID: "PLACEHOLDER_WILL_BE_REPLACED_BY_CICD"
  INFISICAL_CLIENT_SECRET: "PLACEHOLDER_WILL_BE_REPLACED_BY_CICD"
  INFISICAL_PROJECT_ID: "PLACEHOLDER_WILL_BE_REPLACED_BY_CICD"

