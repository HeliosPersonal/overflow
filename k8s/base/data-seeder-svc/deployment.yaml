apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-seeder-svc
  labels:
    app: data-seeder-svc
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-seeder-svc
  template:
    metadata:
      labels:
        app: data-seeder-svc
        component: worker
    spec:
      containers:
        - name: data-seeder-svc
          image: ghcr.io/placeholder/overflow-data-seeder:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            # Keycloak URL/realm/audience + OTEL config from Terraform ConfigMap
            - configMapRef:
                name: overflow-infra-config
          env:
            # .NET environment (maps to DOTNET_ENVIRONMENT for Host-based apps)
            - name: DOTNET_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: aspnetcore-environment

            # Infisical credentials for centralized secrets management
            - name: INFISICAL_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_PROJECT_ID
                  optional: true
            - name: INFISICAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_ID
                  optional: true
            - name: INFISICAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_SECRET
                  optional: true

            # Disable file watching to avoid inotify limits
            - name: DOTNET_USE_POLLING_FILE_WATCHER
              value: "true"
          resources:
            requests:
              memory: "128Mi"
              cpu: "20m"
            limits:
              memory: "384Mi"
