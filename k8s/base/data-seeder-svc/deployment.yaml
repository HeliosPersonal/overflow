apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-seeder-svc
  labels:
    app: data-seeder-svc
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-seeder-svc
  template:
    metadata:
      labels:
        app: data-seeder-svc
        component: worker
    spec:
      containers:
        - name: data-seeder-svc
          image: ghcr.io/placeholder/overflow-data-seeder:latest
          imagePullPolicy: Always
          env:
            - name: DOTNET_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: aspnetcore-environment
            - name: SeederOptions__QuestionServiceUrl
              value: "http://question-svc:8080"
            - name: SeederOptions__ProfileServiceUrl
              value: "http://profile-svc:8080"
            - name: SeederOptions__VoteServiceUrl
              value: "http://vote-svc:8080"
            - name: SeederOptions__LlmApiUrl
              value: "http://ollama-svc.apps-staging.svc.cluster.local:11434/v1/chat/completions"
            - name: SeederOptions__LlmModel
              value: "phi3.5"
            # Infisical credentials - if needed for other secrets
            - name: INFISICAL_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_PROJECT_ID
                  optional: true
            - name: INFISICAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_ID
                  optional: true
            - name: INFISICAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_SECRET
                  optional: true
            # Disable file watching
            - name: DOTNET_USE_POLLING_FILE_WATCHER
              value: "true"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
