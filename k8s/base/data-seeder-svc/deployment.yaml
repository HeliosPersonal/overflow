apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-seeder-svc
  labels:
    app: data-seeder-svc
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-seeder-svc
  template:
    metadata:
      labels:
        app: data-seeder-svc
        component: worker
    spec:
      containers:
        - name: data-seeder-svc
          image: ghcr.io/placeholder/overflow-data-seeder:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            # Provides SEEDER_OPTIONS__OLLAMA_URL, CONNECTION_STRINGS__MESSAGING, etc.
            - configMapRef:
                name: overflow-infra-config
          env:
            - name: DOTNET_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: aspnetcore-environment
            - name: SEEDER_OPTIONS__QUESTION_SERVICE_URL
              value: "http://question-svc:8080"
            - name: SEEDER_OPTIONS__PROFILE_SERVICE_URL
              value: "http://profile-svc:8080"
            - name: SEEDER_OPTIONS__VOTE_SERVICE_URL
              value: "http://vote-svc:8080"
            - name: SEEDER_OPTIONS__LLM_API_URL
              value: "$(SEEDER_OPTIONS__OLLAMA_URL)"
            - name: SEEDER_OPTIONS__LLM_MODEL
              value: "qwen2.5:3b"
            - name: SEEDER_OPTIONS__MAX_GENERATION_RETRIES
              value: "2"
            - name: SEEDER_OPTIONS__ENABLE_CRITIC_PASS
              value: "true"
            - name: SEEDER_OPTIONS__ENABLE_REPAIR_PASS
              value: "true"
            # Infisical credentials
            - name: INFISICAL_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_PROJECT_ID
                  optional: true
            - name: INFISICAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_ID
                  optional: true
            - name: INFISICAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_SECRET
                  optional: true
            - name: DOTNET_USE_POLLING_FILE_WATCHER
              value: "true"
          resources:
            requests:
              memory: "128Mi"
              cpu: "20m"
            limits:
              memory: "384Mi"
