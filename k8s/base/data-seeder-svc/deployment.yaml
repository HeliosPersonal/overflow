# ====================================================================================
# DATA SEEDER SERVICE (AI ANSWER SERVICE) - Deployment
# ====================================================================================
# Event-driven AI answer service — consumes QuestionCreated events via RabbitMQ,
# generates answers using Ollama LLM, and posts them as a single AI user.
# NOT exposed via Ingress — communicates only via RabbitMQ and HTTP to other services.
# ====================================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-seeder-svc
  labels:
    app: data-seeder-svc
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-seeder-svc
  template:
    metadata:
      labels:
        app: data-seeder-svc
        component: api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: data-seeder-svc
          image: ghcr.io/placeholder/overflow-data-seeder:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            # Connection strings + infra config from Terraform ConfigMap
            # (RabbitMQ, Keycloak URL/realm/audience, OTEL)
            - configMapRef:
                name: overflow-infra-config
          env:
            # ASP.NET Core configuration
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: aspnetcore-environment

            # Infisical credentials for centralized secrets management
            - name: INFISICAL_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_PROJECT_ID
                  optional: true
            - name: INFISICAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_ID
                  optional: true
            - name: INFISICAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_SECRET
                  optional: true

            # Disable file watching to avoid inotify limits
            - name: DOTNET_USE_POLLING_FILE_WATCHER
              value: "true"
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              memory: "128Mi"
              cpu: "20m"
            limits:
              memory: "384Mi"
