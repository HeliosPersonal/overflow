# ====================================================================================
# STATS SERVICE - Deployment
# ====================================================================================
# Provides statistics and analytics aggregation using Marten projections
# Tracks question views, answer counts, user activity metrics
# ====================================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: stats-svc
  labels:
    app: stats-svc
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stats-svc
  template:
    metadata:
      labels:
        app: stats-svc
        component: api
    spec:
      containers:
        - name: stats-svc
          image: ghcr.io/placeholder/overflow-stats:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # ASP.NET Core configuration
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: aspnetcore-environment
            
            # Infisical credentials for centralized secrets management
            - name: INFISICAL_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_PROJECT_ID
            - name: INFISICAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_ID
            - name: INFISICAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_SECRET
            # Disable file watching to avoid inotify limits
            - name: DOTNET_USE_POLLING_FILE_WATCHER
              value: "true"
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              memory: "384Mi"
              cpu: "20m"
            limits:
              memory: "768Mi"
              cpu: "200m"

