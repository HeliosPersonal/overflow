apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-svc
  labels:
    app: profile-svc
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-svc
  template:
    metadata:
      labels:
        app: profile-svc
        component: api
    spec:
      containers:
        - name: profile-svc
          image: ghcr.io/placeholder/overflow-profile:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: aspnetcore-environment
            - name: INFISICAL_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_PROJECT_ID
            - name: INFISICAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_ID
            - name: INFISICAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-credentials
                  key: INFISICAL_CLIENT_SECRET
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4318"
            - name: OTEL_SERVICE_NAME
              value: "profile-service"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=$(ASPNETCORE_ENVIRONMENT)"
            - name: DOTNET_USE_POLLING_FILE_WATCHER
              value: "true"
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
